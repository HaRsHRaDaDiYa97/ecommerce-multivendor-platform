name: Multi-Vendor Platform CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ------------------------------------------------------------------
  # 1. Backend Testing & Django Verification Job
  # ------------------------------------------------------------------
  test-backend:
    name: 🐍 Test Django Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Django System Check
        run: |
          cd backend
          python manage.py check

  # ------------------------------------------------------------------
  # 2. Frontend Build Verification Job
  # ------------------------------------------------------------------
  build-frontend:
    name: ⚛️ Build & Lint React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Run ESLint Code Audit
        run: |
          cd frontend
          npm run lint

      - name: Build Frontend Production Asset
        run: |
          cd frontend
          npm run build

  # ------------------------------------------------------------------
  # 3. Automated Vercel Deployment Job (Triggered on Main Push)
  # ------------------------------------------------------------------
  deploy-vercel:
    name: 🚀 Deploy Frontend to Vercel
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Action
        if: ${{ env.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
